services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    environment:
      POSTGRES_DB: social_reaction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_reaction"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/social_reaction
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn api.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/social_reaction
      PIPELINE_MODE: ${PIPELINE_MODE:-scrape_only}
      PIPELINE_INTERVAL_SECONDS: ${PIPELINE_INTERVAL_SECONDS:-1800}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OLLAMA_API_BASE: http://host.docker.internal:11434
      NOMINATIM_URL: http://nominatim:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m worker.run"

  admin:
    build:
      context: .
      dockerfile: docker/admin/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/social_reaction
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn admin.main:app --host 0.0.0.0 --port 8001"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  # Nominatim — self-hosted geocoder (Greece extract).
  # First run downloads the PBF and imports.
  nominatim:
    image: mediagis/nominatim:4.3
    environment:
      PBF_URL: "https://download.geofabrik.de/europe/greece-latest.osm.pbf"
      REPLICATION_URL: "https://download.geofabrik.de/europe/greece-updates/"
      IMPORT_WIKIPEDIA: "false"
      IMPORT_STYLE: "extratags"
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  nominatim_data:
