  <h1>48ωρη απεργία στα νοσοκομεία</h1>
  <p>Οι εργαζόμενοι στα νοσοκομεία κήρυξαν 48ωρη απεργία διαμαρτυρόμενοι για
  τις ελλείψεις προσωπικού και τις χαμηλές αποδοχές. Η κινητοποίηση αφορά
  όλους τους κλάδους της υγείας και αναμένεται να επηρεάσει τη λειτουργία
  πολλών νοσηλευτικών ιδρυμάτων σε όλη την Ελλάδα.</p>
